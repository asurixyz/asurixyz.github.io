<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asuri | Work</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }
        h1, h2 {
            color: #333;
            transition: color 0.3s;
        }
        a {
            color: #007bff;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            text-decoration: underline;
        }
        .navbar {
            text-align: center;
            margin-bottom: 20px;
        }
        .navbar a {
            color: #007bff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }
        .dark-mode {
            background-color: #333;
            color: #fff;
        }
        .dark-mode h1, .dark-mode h2 {
            color: #fff;
        }
        .dark-mode .navbar a {
            color: #007bff; /* Blue color for links in dark mode */
        }
        .toggle-container {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
        }
        .toggle-container img {
            width: 30px;
            height: 30px;
            margin-right: 8px;
        }
        .toggle-container label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .toggle-container input {
            display: none;
        }
        .toggle-container .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
            background-color: #ccc;
            border-radius: 20px;
            transition: background-color 0.3s;
        }
        .toggle-container .switch::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: white;
            transition: transform 0.3s;
            transform: translateX(2px);
            top: 2px;
            left: 2px;
        }
        input:checked + .switch {
            background-color: #2196F3;
        }
        input:checked + .switch::before {
            transform: translateX(14px);
        }
        .content {
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Work Page</h1>
        <div class="toggle-container">
            <img src="https://i.imgur.com/XXAPs1V.png" alt="Dark Mode Icon">
            <label>
                <input type="checkbox" id="mode-toggle">
                <span class="switch"></span>
            </label>
        </div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="personal.html">Personal</a>
            <a href="learning.html">Learning</a>
            <a href="work.html">Work</a>
        </nav>
    </header>
    <main>
        <h2>My Work</h2>
        <p>Content about your work experience goes here.</p>
    </main>
    <footer>
        <p>&copy; 2024 Venkatakrishnan Asuri. All rights reserved.</p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const toggle = document.getElementById('mode-toggle');
            const body = document.body;

            if (localStorage.getItem('dark-mode') === 'true') {
                body.classList.add('dark-mode');
                toggle.checked = true;
            }

            toggle.addEventListener('change', function () {
                if (toggle.checked) {
                    body.classList.add('dark-mode');
                    localStorage.setItem('dark-mode', 'true');
                } else {
                    body.classList.remove('dark-mode');
                    localStorage.setItem('dark-mode', 'false');
                }
            });
        });
    </script>
</body>
</html>
